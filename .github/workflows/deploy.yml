# # Uses:
# #   - withastro/action@v5  — official Astro build+upload action
# #     https://github.com/withastro/action
# #   - actions/deploy-pages@v4 — GitHub's official Pages deployment action
# #     https://github.com/actions/deploy-pages
# #
# # Prerequisites:
# #   1. Set Pages source to "GitHub Actions" in repo Settings > Pages
# #   2. Set `site` in astro.config.mjs to your domain
# #   3. If using a custom domain, add public/CNAME and configure DNS

